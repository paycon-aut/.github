name: Feature Request
description: Solicitar nova funcionalidade
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: textarea
    attributes:
      label: Descricao da funcionalidade
    validations:
      required: true
  - type: textarea
    attributes:
      label: Problema que resolve
  - type: textarea
    attributes:
      label: Solucao proposta
  - type: textarea
    attributes:
      label: Criterios de aceite
      placeholder: "- [ ] Criterio 1\n- [ ] Criterio 2"
